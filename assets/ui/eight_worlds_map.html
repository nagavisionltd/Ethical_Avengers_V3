<div id="world-map-ui"
    style="width: 960px; height: 540px; position: relative; overflow: hidden; font-family: 'Courier New', monospace;">

    <!-- SVG Background and connecting lines -->
    <svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg"
        style="position: absolute; top: 0; left: 0; z-index: 1;">
        <defs>
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#001133" />
                <stop offset="100%" stop-color="#000005" />
            </radialGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>

        <rect width="960" height="540" fill="url(#bgGrad)" />

        <!-- Grid Lines -->
        <g stroke="rgba(0, 255, 255, 0.05)" stroke-width="1">
            <line x1="0" y1="90" x2="960" y2="90" />
            <line x1="0" y1="180" x2="960" y2="180" />
            <line x1="0" y1="270" x2="960" y2="270" />
            <line x1="0" y1="360" x2="960" y2="360" />
            <line x1="0" y1="450" x2="960" y2="450" />
            <line x1="160" y1="0" x2="160" y2="540" />
            <line x1="320" y1="0" x2="320" y2="540" />
            <line x1="480" y1="0" x2="480" y2="540" />
            <line x1="640" y1="0" x2="640" y2="540" />
            <line x1="800" y1="0" x2="800" y2="540" />
        </g>

        <!-- Connection Paths connecting the 9 stages -->
        <path d="M 120 420 L 250 280 L 400 400 L 520 220 L 700 350 L 680 150 L 850 250 L 820 440 L 480 270" fill="none"
            class="stage-path" />

        <!-- Central Sun/Energy Core representing Terra Prima or The Firmament -->
        <circle cx="480" cy="270" r="150" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="40" />
        <circle cx="480" cy="270" r="100" fill="none" stroke="rgba(0,255,255,0.05)" stroke-width="20" />
    </svg>

    <!-- HTML UI Nodes -->
    <div id="nodes-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;">

        <!-- Stage 1 -->
        <button id="stage-IceWall" class="map-node unlocked" style="left: 120px; top: 420px; --pulse-color: #66ccff;">
            <div class="node-dot"></div>
            <div class="node-label">1. ICE WALL</div>
        </button>

        <!-- Stage 2 -->
        <button id="stage-Aurelion" class="map-node locked" style="left: 250px; top: 280px; --pulse-color: #ffaa00;">
            <div class="node-dot"></div>
            <div class="node-label">2. AURELION</div>
        </button>

        <!-- Stage 3 -->
        <button id="stage-Noktara" class="map-node locked" style="left: 400px; top: 400px; --pulse-color: #660099;">
            <div class="node-dot"></div>
            <div class="node-label">3. NOKTARA</div>
        </button>

        <!-- Stage 4 -->
        <button id="stage-Virella" class="map-node locked" style="left: 520px; top: 220px; --pulse-color: #00ff66;">
            <div class="node-dot"></div>
            <div class="node-label">4. VIRELLA</div>
        </button>

        <!-- Stage 5 -->
        <button id="stage-Khemra" class="map-node locked" style="left: 700px; top: 350px; --pulse-color: #ff3300;">
            <div class="node-dot"></div>
            <div class="node-label">5. KHEMRA</div>
        </button>

        <!-- Stage 6 -->
        <button id="stage-Aetherion" class="map-node locked" style="left: 680px; top: 150px; --pulse-color: #00ccff;">
            <div class="node-dot"></div>
            <div class="node-label">6. AETHERION</div>
        </button>

        <!-- Stage 7 -->
        <button id="stage-Thalassa" class="map-node locked" style="left: 850px; top: 250px; --pulse-color: #0033cc;">
            <div class="node-dot"></div>
            <div class="node-label">7. THALASSA</div>
        </button>

        <!-- Stage 8 -->
        <button id="stage-UmbraPrime" class="map-node locked" style="left: 820px; top: 440px; --pulse-color: #ff00ff;">
            <div class="node-dot"></div>
            <div class="node-label">8. UMBRA</div>
        </button>

        <!-- Stage 9 (Center) -->
        <button id="stage-TerraPrima" class="map-node locked boss-node"
            style="left: 480px; top: 270px; --pulse-color: #ffffff;">
            <div class="node-dot"></div>
            <div class="node-label">★ TERRA PRIMA</div>
        </button>

    </div>

    <style>
        .stage-path {
            stroke: rgba(0, 255, 170, 0.4);
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            animation: dashScroll 40s linear infinite;
            filter: url(#glow);
        }

        @keyframes dashScroll {
            to {
                stroke-dashoffset: -1000;
            }
        }

        .map-node {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .node-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            box-shadow: 0 0 0px #000;
            transition: all 0.3s ease;
        }

        .node-label {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #aaa;
            transition: color 0.3s ease;
        }

        /* Unlocked State */
        .map-node.unlocked {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 10, 30, 0.7);
        }

        .map-node.unlocked .node-dot {
            background: var(--pulse-color);
            box-shadow: 0 0 10px var(--pulse-color);
            animation: pulseDot 2s infinite alternate;
        }

        .map-node.unlocked .node-label {
            color: #fff;
            text-shadow: 0 0 5px var(--pulse-color);
        }

        .map-node.unlocked:hover {
            transform: translate(-50%, -50%) scale(1.15);
            border-color: var(--pulse-color);
            background: rgba(0, 20, 50, 0.9);
            z-index: 10;
        }

        /* Locked State */
        .map-node.locked {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .map-node.locked:hover {
            transform: translate(-50%, -50%) scale(0.95);
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
        }

        /* Boss Node */
        .map-node.boss-node {
            padding: 12px 24px;
            border-radius: 30px;
        }

        .map-node.boss-node .node-dot {
            width: 16px;
            height: 16px;
        }

        .map-node.boss-node .node-label {
            font-size: 14px;
            color: #ffd700;
        }

        @keyframes pulseDot {
            from {
                box-shadow: 0 0 5px var(--pulse-color);
            }

            to {
                box-shadow: 0 0 20px var(--pulse-color), 0 0 40px var(--pulse-color);
            }
        }
    </style>
</div>
