<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ethical Avengers V3 - Fixed Pathways</title>
    <script src="./phaser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            width: 960px;
            height: 540px;
            box-shadow: 0 0 60px rgba(0, 255, 170, 0.4);
        }
    </style>
</head>

<body>
    <div id="game-container"></div>
    <script src="src/Config.js?v=16.5.1"></script>
    <script src="src/Dialogue.js?v=16.8.3"></script>
    <script src="src/systems/CombatFeedback.js?v=17.0.0"></script>
    <script src="src/systems/RPGSystem.js?v=17.0.0"></script>
    <script src="src/entities/Enemy.js?v=17.0.0"></script>
    <script src="src/entities/NeoPlayer_v16.js?v=16.24.0"></script>
    <script src="src/scenes/BaseScene.js?v=17.10.1"></script>
    <script src="src/scenes/Boot_v16.js?v=16.16.2"></script>
    <script src="src/scenes/UIScene.js?v=16.9.1"></script>
    <script src="src/scenes/ModeSelectScene.js?v=16.4.1"></script>
    <script src="src/scenes/CharacterSelectScene.js?v=16.9.0"></script>
    <script src="src/scenes/GameOverScene.js?v=17.0.0"></script>
    <script src="src/scenes/WorldSelectScene.js?v=16.4.1"></script>
    <script src="src/scenes/UpgradeScene.js?v=16.4.1"></script>
    <script src="src/scenes/IntroScene.js?v=16.8.1"></script>
    <script src="src/scenes/DialogueScene.js?v=16.11.1"></script>
    <script src="src/scenes/StageTitleScene.js?v=16.4.1"></script>
    <script src="src/scenes/VideoIntroScene.js?v=1.0.0"></script>
    <script src="src/scenes/Level1_Antarctica.js?v=17.10.4"></script>
    <script src="src/scenes/GenericTilemapScene.js?v=17.13"></script>

    <script>
        console.log("%c ETHICAL AVENGERS V3 - VERSION 17.0.0 - ARCADE CHAIN BUILD ", "background: #00ff00; color: #000; font-weight: bold;");
        window.game = new Phaser.Game({
            type: Phaser.AUTO, width: 960, height: 540, parent: 'game-container', pixelArt: true,
            transparent: true,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            dom: { createContainer: true },
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 }, fixedStep: true, fps: 120, debug: true } },
            scene: [
                Boot, VideoIntroScene, ModeSelectScene, CharacterSelectScene, WorldSelectScene,
                UpgradeScene,
                IntroScene, DialogueScene, StageTitleScene, Level1_Antarctica,
                GenericTilemapScene, UIScene, GameOverScene
            ]
        });
    </script>
</body>

</html>
