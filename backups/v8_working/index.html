<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethical Avengers V4.8 - MODULAR</title>
    <script src="./phaser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #game-container { width: 960px; height: 540px; border: 4px solid #333; background: #111; position: relative; box-shadow: 0 0 60px rgba(0, 255, 170, 0.4); }
        #start-overlay { position: absolute; width: 100%; height: 100%; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); text-align: center; border: 2px solid #00ffaa; }
        .btn { padding: 20px 40px; font-family: 'Press Start 2P', cursive; background: #00ffaa; color: #000; border: none; cursor: pointer; font-size: 18px; margin-top: 20px; transition: 0.1s; }
        .btn:hover { background: #fff; }
        .hidden { display: none !important; }
        h1 { color: #00ffaa; font-size: 28px; margin-bottom: 10px; }
        p { color: #fff; font-size: 10px; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-overlay">
            <h1>AVENGERS V4.8</h1>
            <p>MODULAR ARCHITECTURE LOADED</p>
            <button id="start-btn" class="btn">INITIALIZE</button>
        </div>
    </div>

    <!-- Core Configuration -->
    <script src="src/Config.js"></script>
    
    <!-- Entities -->
    <script src="src/entities/Player.js"></script>
    
    <!-- Scenes -->
    <script src="src/scenes/BaseScene.js"></script>
    <script src="src/scenes/Boot.js"></script>
    <script src="src/scenes/MainScene.js"></script>
    <script src="src/scenes/Level2Scene.js"></script>
    <script src="src/scenes/CutsceneScene.js"></script>
    <script src="src/scenes/BossFightScene.js"></script>
    <script src="src/scenes/CityScene.js"></script>

    <script>
        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-overlay').classList.add('hidden');
            new Phaser.Game({
                type: Phaser.CANVAS, width: 960, height: 540, parent: 'game-container', pixelArt: true,
                scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
                physics: { default: 'arcade', arcade: { gravity: { y: 1600 }, debug: false } },
                scene: [Boot, MainScene, Level2Scene, CutsceneScene, BossFightScene, CityScene]
            });
        };
    </script>
</body>
</html>
