<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARPED CITY - LEVEL TEMPLATE</title>
    <script src="./phaser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        #game-container { width: 960px; height: 540px; border: 4px solid #ff00aa; background: #000; position: relative; box-shadow: 0 0 80px rgba(255, 0, 170, 0.2); }
        #header { margin-bottom: 20px; color: #00ffaa; text-shadow: 2px 2px #ff00aa; text-align: center; }
        #instructions { color: #888; font-size: 10px; margin-top: 10px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>
    <div id="header">
        <h1>WARPED CITY</h1>
        <p style="font-size: 12px; color: #fff;">TEMPLATE BUILD v1.0</p>
    </div>

    <div id="game-container"></div>

    <div id="instructions">
        CONTROLS: WASD/ARROWS to Move • SPACE to Jump • J to Punch • K to Kick • L to Special<br>
        DEBUG: This template loads 'CyberCity' directly. Edit 'window.START_SCENE' to change.
    </div>

    <!-- Core Configuration -->
    <script src="src/Config.js?v=9.5"></script>
    <script src="src/Dialogue.js?v=1.0"></script>
    <script src="src/Config.js?v=9.5"></script>
    
    <!-- Entities -->
    <script src="src/entities/Player.js?v=9.2"></script>
    <script src="src/entities/NeoPlayer.js?v=9.2"></script>
    
    <!-- Base Scene Class -->
    <script src="src/scenes/BaseScene.js?v=7.6"></script>
    
    <!-- Required Scenes -->
    <script src="src/scenes/BootWarped.js?v=1.0"></script>
    <script src="src/scenes/UIScene.js?v=9.2"></script>
    <script src="src/scenes/PauseScene.js?v=1.0"></script>
    <script src="src/scenes/CyberCityScene.js?v=1.2"></script>
    
    <!-- Placeholder Scenes -->
    <script src="src/scenes/ModeSelectScene.js?v=1.0"></script>

    <script>
        // CONFIGURATION: BootWarped will handle starting the correct scene.
        
        // Initialize Game
        new Phaser.Game({
            type: Phaser.AUTO, 
            width: 960, 
            height: 540, 
            parent: 'game-container', 
            pixelArt: true,
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            physics: { default: 'arcade', arcade: { gravity: { y: 1600 }, debug: false } },
            // Only loading necessary scenes for this template
            scene: [BootWarped, UIScene, CyberCityScene, PauseScene, ModeSelectScene] 
        });
    </script>
</body>
</html>
